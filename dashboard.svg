<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="100%" height="100%" style="background-color: #080d19;">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e1726" />
      <stop offset="100%" stop-color="#050810" />
    </linearGradient>
    <linearGradient id="panel-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#18253d" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.4" />
    </linearGradient>
    <linearGradient id="bar-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <linearGradient id="bar-grad-alt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    
    <style>
      .grid-line { stroke: #1e293b; stroke-width: 1; stroke-dasharray: 4 4; fill: none; }
      .panel-border { stroke: #2a3a54; stroke-width: 1.5; fill: url(#panel-grad); rx: 6; }
      .text-base { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; fill: #94a3b8; font-size: 14px; }
      .text-title { fill: #f8fafc; font-weight: bold; font-size: 18px; }
      
      /* Анимация рисования линий */
      .draw-line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawLine 8s infinite; }
      @keyframes drawLine {
        0%, 10% { stroke-dashoffset: 1000; }
        40%, 90% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: 1000; }
      }
      
      /* Анимация роста столбцов (снизу вверх) */
      .grow-bar { transform-origin: bottom; transform: scaleY(0); animation: growBar 8s infinite; }
      @keyframes growBar {
        0%, 15% { transform: scaleY(0); }
        35%, 90% { transform: scaleY(1); }
        100% { transform: scaleY(0); }
      }

      /* Плавное появление (Fade In) */
      .fade-in { opacity: 0; animation: fadeIn 8s infinite; }
      @keyframes fadeIn {
        0%, 20% { opacity: 0; }
        40%, 90% { opacity: 1; }
        100% { opacity: 0; }
      }

      /* Парение карточек */
      .float { animation: float 6s ease-in-out infinite; }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      
      /* Пульсация матрицы */
      .pulse-matrix { animation: pulseOp 4s infinite alternate; }
      @keyframes pulseOp { 0% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
  </defs>

  <rect width="1200" height="700" fill="url(#bg-grad)" />
  <path d="M 0 0 L 300 0 L 150 200 Z" fill="#ffffff" opacity="0.02" />
  <path d="M 1200 700 L 900 700 L 1050 500 Z" fill="#ffffff" opacity="0.02" />
  <path d="M 1200 0 L 800 0 L 1200 400 Z" fill="#0c1322" />
  <path d="M 0 700 L 400 700 L 0 300 Z" fill="#0c1322" />

  <g transform="translate(60, 60)">
    <rect x="0" y="0" width="340" height="220" class="panel-border" />
    <path d="M 20 40 L 320 40 M 20 80 L 320 80 M 20 120 L 320 120 M 20 160 L 320 160 M 20 200 L 320 200" class="grid-line" />
    <path d="M 60 20 L 60 200 M 120 20 L 120 200 M 180 20 L 180 200 M 240 20 L 240 200 M 300 20 L 300 200" class="grid-line" opacity="0.5" />
    <path d="M 20 180 L 80 130 L 140 150 L 200 90 L 260 100 L 320 40" stroke="#60a5fa" stroke-width="3" fill="none" class="draw-line" filter="url(#glow)" />
    <g class="fade-in" fill="#ffffff">
      <circle cx="20" cy="180" r="4" filter="url(#glow)"/>
      <circle cx="80" cy="130" r="4" filter="url(#glow)"/>
      <circle cx="140" cy="150" r="4" filter="url(#glow)"/>
      <circle cx="200" cy="90" r="4" filter="url(#glow)"/>
      <circle cx="260" cy="100" r="4" filter="url(#glow)"/>
      <circle cx="320" cy="40" r="4" filter="url(#glow)"/>
    </g>
  </g>

  <g transform="translate(430, 60)">
    <line x1="0" y1="220" x2="340" y2="220" stroke="#334155" stroke-width="1.5" />
    
    <g fill="url(#bar-grad)">
      <rect x="30" y="160" width="16" height="60" class="grow-bar" style="animation-delay: 0.1s" />
      <rect x="54" y="140" width="16" height="80" class="grow-bar" style="animation-delay: 0.2s" />
      <rect x="78" y="110" width="16" height="110" class="grow-bar" style="animation-delay: 0.3s" />
      <rect x="102" y="80" width="16" height="140" class="grow-bar" style="animation-delay: 0.4s" />
      <rect x="126" y="50" width="16" height="170" class="grow-bar" style="animation-delay: 0.5s" />
      <rect x="150" y="30" width="16" height="190" class="grow-bar" style="animation-delay: 0.6s" fill="#93c5fd" filter="url(#glow)" /> <rect x="174" y="60" width="16" height="160" class="grow-bar" style="animation-delay: 0.7s" />
      <rect x="198" y="90" width="16" height="130" class="grow-bar" style="animation-delay: 0.8s" />
      <rect x="222" y="120" width="16" height="100" class="grow-bar" style="animation-delay: 0.9s" />
      <rect x="246" y="150" width="16" height="70" class="grow-bar" style="animation-delay: 1.0s" />
      <rect x="270" y="170" width="16" height="50" class="grow-bar" style="animation-delay: 1.1s" />
      <rect x="294" y="190" width="16" height="30" class="grow-bar" style="animation-delay: 1.2s" />
    </g>
    <path d="M 10 215 C 60 215, 110 30, 158 30 C 206 30, 260 215, 330 215" stroke="#e2e8f0" stroke-width="2.5" fill="none" class="draw-line" filter="url(#glow-strong)" />
  </g>

  <g transform="translate(800, 60)">
    <line x1="20" y1="220" x2="320" y2="220" stroke="#334155" stroke-width="1.5" />
    <line x1="170" y1="20" x2="170" y2="200" stroke="#334155" stroke-width="1" stroke-dasharray="4 4" />
    
    <circle cx="95" cy="40" r="16" fill="none" stroke="#64748b" stroke-width="2" />
    <text x="95" y="45" class="text-base" font-weight="bold" text-anchor="middle" fill="#94a3b8">A</text>
    
    <circle cx="245" cy="40" r="16" fill="none" stroke="#60a5fa" stroke-width="2" filter="url(#glow)"/>
    <path d="M 238 40 L 243 45 L 253 35" stroke="#60a5fa" stroke-width="2" fill="none" filter="url(#glow)"/>
    
    <rect x="50" y="140" width="20" height="80" fill="url(#bar-grad-alt)" class="grow-bar" />
    <rect x="75" y="100" width="20" height="120" fill="url(#bar-grad-alt)" class="grow-bar" style="animation-delay: 0.2s" />
    <rect x="100" y="60" width="20" height="160" fill="url(#bar-grad-alt)" class="grow-bar" style="animation-delay: 0.4s" />
    <text x="85" y="240" class="text-base" text-anchor="middle">A</text>

    <rect x="200" y="110" width="20" height="110" fill="url(#bar-grad)" class="grow-bar" style="animation-delay: 0.1s" />
    <rect x="225" y="70" width="20" height="150" fill="url(#bar-grad)" class="grow-bar" style="animation-delay: 0.3s" />
    <rect x="250" y="40" width="20" height="180" fill="url(#bar-grad)" class="grow-bar" style="animation-delay: 0.5s" />
    <text x="235" y="240" class="text-base" text-anchor="middle">B</text>
  </g>

  <g transform="translate(60, 360)">
    <rect x="0" y="0" width="180" height="220" fill="none" stroke="#2a3a54" stroke-width="1.5" />
    <g fill="#60a5fa" class="fade-in">
      <circle cx="30" cy="180" r="3"/><circle cx="45" cy="160" r="2"/><circle cx="60" cy="190" r="3.5"/>
      <circle cx="50" cy="130" r="2.5"/><circle cx="70" cy="150" r="3"/><circle cx="85" cy="110" r="2"/>
      <circle cx="95" cy="140" r="4" fill="#93c5fd" filter="url(#glow)"/><circle cx="110" cy="100" r="2.5"/>
      <circle cx="120" cy="130" r="3"/><circle cx="140" cy="90" r="2"/><circle cx="150" cy="110" r="3.5"/>
      <circle cx="160" cy="70" r="2"/><circle cx="130" cy="60" r="3"/><circle cx="100" cy="80" r="2"/>
      <circle cx="75" cy="170" r="2"/><circle cx="115" cy="175" r="3"/><circle cx="145" cy="155" r="2"/>
    </g>
  </g>

  <g transform="translate(280, 360)">
    <circle cx="90" cy="110" r="70" fill="#1e293b" />
    <path d="M 90 110 L 90 40 A 70 70 0 0 1 155 85 Z" fill="#60a5fa" class="fade-in" />
    <path d="M 90 110 L 155 85 A 70 70 0 0 1 110 177 Z" fill="#3b82f6" class="fade-in" style="animation-delay: 0.2s" />
    <path d="M 90 110 L 110 177 A 70 70 0 0 1 25 85 Z" fill="#1e3a8a" class="fade-in" style="animation-delay: 0.4s" />
    <path d="M 90 110 L 25 85 A 70 70 0 0 1 90 40 Z" fill="#94a3b8" class="fade-in" style="animation-delay: 0.6s" />
    <circle cx="90" cy="110" r="70" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.1" />
  </g>

  <g transform="translate(480, 360)">
    <g stroke="#1e293b" stroke-width="1.5">
      <path d="M 0 0 L 160 0 M 0 20 L 160 20 M 0 40 L 160 40 M 0 60 L 160 60 M 0 80 L 160 80 M 0 100 L 160 100 M 0 120 L 160 120 M 0 140 L 160 140 M 0 160 L 160 160" />
      <path d="M 0 0 L 0 160 M 20 0 L 20 160 M 40 0 L 40 160 M 60 0 L 60 160 M 80 0 L 80 160 M 100 0 L 100 160 M 120 0 L 120 160 M 140 0 L 140 160 M 160 0 L 160 160" />
    </g>
    <g class="fade-in">
      <rect x="0" y="0" width="20" height="20" fill="#93c5fd" filter="url(#glow)" class="pulse-matrix" style="animation-delay: 0s"/>
      <rect x="20" y="20" width="20" height="20" fill="#60a5fa" filter="url(#glow)" class="pulse-matrix" style="animation-delay: 0.2s"/>
      <rect x="40" y="40" width="20" height="20" fill="#3b82f6" filter="url(#glow)" class="pulse-matrix" style="animation-delay: 0.4s"/>
      <rect x="60" y="60" width="20" height="20" fill="#60a5fa" filter="url(#glow)" class="pulse-matrix" style="animation-delay: 0.6s"/>
      <rect x="80" y="80" width="20" height="20" fill="#93c5fd" filter="url(#glow)" class="pulse-matrix" style="animation-delay: 0.8s"/>
      <rect x="100" y="100" width="20" height="20" fill="#60a5fa" filter="url(#glow)" class="pulse-matrix" style="animation-delay: 1.0s"/>
      <rect x="120" y="120" width="20" height="20" fill="#3b82f6" filter="url(#glow)" class="pulse-matrix" style="animation-delay: 1.2s"/>
      <rect x="140" y="140" width="20" height="20" fill="#93c5fd" filter="url(#glow)" class="pulse-matrix" style="animation-delay: 1.4s"/>
      
      <rect x="20" y="0" width="20" height="20" fill="#1e3a8a" opacity="0.5"/>
      <rect x="0" y="20" width="20" height="20" fill="#1e3a8a" opacity="0.5"/>
      <rect x="60" y="40" width="20" height="20" fill="#1e293b" opacity="0.8"/>
      <rect x="40" y="60" width="20" height="20" fill="#1e293b" opacity="0.8"/>
      <rect x="100" y="80" width="20" height="20" fill="#334155" opacity="0.6"/>
      <rect x="140" y="100" width="20" height="20" fill="#1e3a8a" opacity="0.4"/>
    </g>
  </g>

  <g transform="translate(680, 360)">
    <path d="M 125 100 L 145 100 M 135 90 L 145 100 L 135 110" stroke="#475569" stroke-width="3" fill="none" />
    
    <g class="float" style="animation-delay: 0s">
      <rect x="10" y="40" width="100" height="130" class="panel-border" />
      <circle cx="60" cy="75" r="20" fill="#1e293b" stroke="#334155" stroke-width="2" />
      <text x="60" y="82" class="text-title" fill="#94a3b8" text-anchor="middle">A</text>
      <rect x="25" y="110" width="30" height="15" fill="#334155" rx="2" />
      <rect x="60" y="110" width="25" height="4" fill="#334155" rx="1" />
      <rect x="60" y="121" width="25" height="4" fill="#334155" rx="1" />
      <rect x="25" y="145" width="50" height="6" fill="#1e293b" rx="3" />
      <rect x="25" y="145" width="28" height="6" fill="#64748b" rx="3" />
      <text x="80" y="152" class="text-base" font-size="12">56%</text>
    </g>

    <g class="float" style="animation-delay: 1.5s">
      <rect x="160" y="25" width="115" height="150" fill="#12203b" stroke="#3b82f6" stroke-width="1.5" rx="8" filter="url(#glow)"/>
      <rect x="160" y="25" width="115" height="150" fill="url(#panel-grad)" rx="8" />
      
      <circle cx="217" cy="65" r="24" fill="#1e3a8a" stroke="#60a5fa" stroke-width="2" filter="url(#glow)"/>
      <text x="217" y="73" class="text-title" fill="#ffffff" text-anchor="middle" font-size="22">B</text>
      <rect x="180" y="110" width="35" height="18" fill="#1e3a8a" rx="2" />
      <rect x="225" y="110" width="30" height="5" fill="#3b82f6" rx="1" />
      <rect x="225" y="123" width="30" height="5" fill="#3b82f6" rx="1" />
      <rect x="180" y="150" width="55" height="6" fill="#1e293b" rx="3" />
      <rect x="180" y="150" width="40" height="6" fill="#3b82f6" rx="3" filter="url(#glow)">
         <animate attributeName="width" values="0;40;40;0" dur="8s" repeatCount="indefinite" />
      </rect>
      <text x="245" y="156" class="text-base" font-size="12" fill="#93c5fd">72%</text>
    </g>

    <g transform="translate(320, 0)">
      <path id="curve1" d="M 0 160 Q 50 160, 100 80 T 200 20" stroke="#1e293b" stroke-width="2" fill="none" />
      <path id="curve2" d="M 0 190 Q 70 180, 120 120 T 200 60" stroke="#1e293b" stroke-width="2" fill="none" />
      <path id="curve3" d="M 0 220 Q 90 200, 140 160 T 200 100" stroke="#3b82f6" stroke-width="2" fill="none" filter="url(#glow)"/>
      
      <circle r="4" fill="#ffffff" filter="url(#glow)">
        <animateMotion dur="3s" repeatCount="indefinite"><mpath href="#curve1"/></animateMotion>
      </circle>
      <circle r="3" fill="#60a5fa" filter="url(#glow)">
        <animateMotion dur="4s" repeatCount="indefinite"><mpath href="#curve2"/></animateMotion>
      </circle>
      <circle r="5" fill="#93c5fd" filter="url(#glow)">
        <animateMotion dur="2.5s" repeatCount="indefinite"><mpath href="#curve3"/></animateMotion>
      </circle>
    </g>
  </g>
</svg>
